name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install rich cloudscraper requests
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --console --name parking_bot interfaz.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: parking_bot
        path: dist/parking_bot.exe